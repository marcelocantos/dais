  T18:
    name: Grok is the jevons overseer
    status: converging
    value: 13.0
    cost: 8.0
    acceptance:
    - The jevons root agent is Grok (xAI Realtime). Voice and text input both route through the same Grok session.
    - Grok session lifetime is server-owned, not tied to /ws/voice. Lazily opened on first input (voice, text, or upload); 30s idle timeout reset on any activity; survives across PTT presses, page reloads, and text-only periods.
    - /ws/voice is the audio-I/O sub-protocol on the Grok session (mic frames in, PCM audio out). /ws/chat is the text-I/O sub-protocol on the same session (typed text in; text responses appear in the chat panel by tailing the JSONL).
    - 'Per-turn response modality follows input modality: voice in → modalities=["text","audio"]; text in → modalities=["text"] (no wasted audio generation, no audio readback when the user typed).'
    - 'Grok''s tool surface is overseer-shaped: delegate(agent_name, task, attachments?), list_agents(), task_status(task_id), and a small handful of read-only inspection tools as identified during implementation. No code-level MCP tools wired into Grok directly.'
    - delegate is ASYNCHRONOUS. The tool call returns immediately with {task_id, status:dispatched}. Grok acknowledges to the user ("on it" or similar) and continues the conversation. When the worker eventually completes, jevonsd appends a synthetic system message to the Grok JSONL describing the result and triggers response.create so Grok speaks/writes the summary. Multiple workers can run concurrently.
    - If a completion notification arrives while Grok is mid-response (response.created without response.done), jevonsd queues it and dispatches after response.done. Multiple queued completions are emitted as separate system messages, one response.create per notification (Grok may batch in its response if it chooses).
    - 'System prompt makes the async model explicit to Grok: "you supervise a team of workers; dispatched tasks run in the background; you receive completion notifications as system messages; surface them to the user conversationally."'
    - 'Two classes of agent in the registry. PROJECT agents (jevons, jevons-po, ...) are user-facing and project-scoped; the user can list/manage them; list_agents() exposes them. SYSTEM agents (e.g. vision, ocr) are hidden capability-extension workers Grok dispatches to behind the scenes when a task needs a capability Grok-the-model lacks (image analysis, etc.). System agents do not appear in list_agents() and the user doesn''t see explicit delegations to them — Grok presents the result as its own. Implementation: an `agent_class` field on AgentDef, default project; system agents reachable via the same delegate tool but excluded from the user-visible listing.'
    - Claude agents in the registry remain unchanged as workers reachable via Grok's delegate tool. Their own JSONLs and MCP servers are untouched.
    - Grok's conversation is persisted as JSONL at ~/.jevons/grok/<session>.jsonl. Every Realtime event we care about (user item, assistant item, tool call, tool result, async system notification) is appended. The chat panel renders by tailing this file — voice transcripts survive page reloads because the JSONL is the source of truth.
    - On Realtime reconnect (network blip, dev hot-reload), prior conversation is replayed into the new session via conversation.item.create so context resumes.
    - 'Image paste / drop in the chat UI uploads bytes to jevonsd, stored at ~/.jevons/images/<id>.<ext>. Server appends a synthetic user turn [image: <id>] <caption> to the Grok JSONL. UI renders the marker as an inline <img>. For project-scoped image work Grok delegates to a project agent (e.g. jevons-po) explicitly. For image questions with no project owner ("what''s in this picture?"), Grok dispatches to the hidden vision system agent and presents the result as its own answer. (Phase 2 — ship after Phase 1 lands.)'
    - send_to_jevons, InjectAssistantText and VoiceBridge.InjectResponse are removed — Grok IS the agent, no bridge indirection.
    context: 'Today: Claude is the root agent, Grok is a voice frontend that calls send_to_jevons to delegate user prompts to Claude. This inverts: Grok becomes the root overseer. Claude agents in the registry remain as workers, accessed through an asynchronous delegate tool. Why now: the bridge architecture has tension around voice transcripts not being persisted (Grok''s conversational replies are DOM-only, killed on every page reload). The cleanest fix is to make Grok''s conversation canonical — and once it is, Grok logically IS the agent, not a bridge. Aligns with the previously-noted intent that T13''s full-duplex voice \"collapses into T18 — no send_to_jevons indirection.\" Persistence: Grok-side JSONL, mirroring Claude Code''s shape so mnemo can index it. Justification for not using SQLite documented in conversation 2026-05-14 (recent commit collapsed parallel stores onto JSONL; append-only workload; mnemo compatibility). Text mode design (conversation 2026-05-14): the iPad will be voice-only by deployment context, but on the laptop the user wants to drop to text when entering code (STT mangles syntax). Both modalities route through the same Grok session; response modality matches input modality. Image handling (Phase 2, same conversation): UI-construct rather than Realtime-API-construct — images uploaded to a stable path, referenced by ID in the JSONL as text markers, delegated to Claude workers (whose vision is stronger) via a delegate attachments parameter; UI renders markers as inline images. Async delegation (conversation 2026-05-14): worker invocation is asynchronous all the way down. delegate() returns immediately; completion notifications arrive later via system messages injected into the Grok session, triggering a response.create. Rejected the layered \"sync to first-tier, async beneath\" model — relocates rather than eliminates async complexity and adds a fragile must-respond-fast guarantee on first-tier workers. Implementation order: (1) Grok system prompt + tool surface (async delegate, list_agents, task_status); (2) text chat input routed to Grok; (3) JSONL persistence + replay-on-reconnect; (4) async completion notification path; (5) drop dead bridge code; (6) image upload + render (Phase 2).'
    origin: manual
    discovered: 2026-03-30
  T19:
    name: jevonsd runs cleanly under `brew services` with a service block, gh dependency, and PATH augmentation so launchd-spawned daemon resolves all external tools
    status: identified
    value: 0.0
    cost: 0.0
    acceptance:
    - Formula at `~/work/github.com/marcelocantos/homebrew-tap/Formula/jevons.rb` gains a `service do` block running `[opt_bin/"jevonsd"]` (the daemon binary), with `keep_alive true` and log paths configured
    - Service block sets `environment_variables PATH:` to `"/opt/homebrew/bin:/opt/homebrew/sbin:#{Dir.home}/.cargo/bin:#{Dir.home}/.local/bin:#{Dir.home}/.py/bin:#{Dir.home}/go/bin:/usr/bin:/bin:/usr/sbin:/sbin"`
    - Formula declares `depends_on "gh"` (the only brew-installable tool the daemon shells out to)
    - '`brew services start jevons` (or `restart` after install) launches jevonsd successfully and the active-work MCP feature can resolve `gh` without manual PATH setup'
    - The CLI `remote` binary remains terminal-launched and unaffected
    context: |-
      Background: launchd-spawned MCP daemons (started via `brew services`) inherit a minimal PATH (`/usr/bin:/bin:/usr/sbin:/sbin`). Any external tool the daemon shells out to that lives in `/opt/homebrew/bin`, `~/.cargo/bin`, `~/.local/bin`, `~/.py/bin`, or `~/go/bin` fails to resolve at runtime. Cross-repo design decision was made in ~/think on 2026-04-27. Sibling targets exist on mnemo (🎯T47), sawmill (🎯T33), vellum (🎯T8), and pageflip (🎯T32).

      Two distinct gaps in jevons (both addressable in this target):

      **Gap 1: Formula has no `service do` block.**
      Per `docs/vision-v2.md:61`, jevonsd is intended to run as a brew service. The formula at `homebrew-tap/Formula/jevons.rb` currently installs the binaries but doesn't define service metadata. Until this is added, `brew services start jevons` is a no-op.

      **Gap 2: Daemon shells out to `gh` without PATH augmentation.**
      Once Gap 1 is fixed and jevonsd runs under launchd, the spartan PATH bug activates. Audit found `gh` is the only brew-installable tool used by the daemon code path.

      Audit findings for jevons (from ~/think investigation 2026-04-27):
      - `cmd/jevonsd/main.go:846,848,854` — calls `security` (system, /usr/bin/security; fine)
      - `internal/discovery/discovery.go:247` — calls `pgrep` (system; fine)
      - `internal/discovery/discovery.go:262` — calls `ps` (system; fine)
      - `internal/discovery/discovery.go:340` — calls `lsof` (system; fine)
      - `internal/mcpserver/activework.go:274,289` — calls `git` (system; fine)
      - `internal/mcpserver/activework.go:324` — calls `gh` (brew-installable; needs depends_on AND PATH)

      The CLI `remote` binary is terminal-launched, inherits shell PATH, and is not affected.

      Design decision (from ~/think 2026-04-27): fix at the formula's `service` block, not in code, not via global `launchctl setenv`, not via wrapper script. Reasons: per-daemon scope, regenerated by `brew services` on every install/upgrade, no code change.

      Formula additions (template):
      ```ruby
      depends_on "gh"

      service do
        run [opt_bin/"jevonsd"]
        environment_variables PATH: "/opt/homebrew/bin:/opt/homebrew/sbin:#{Dir.home}/.cargo/bin:#{Dir.home}/.local/bin:#{Dir.home}/.py/bin:#{Dir.home}/go/bin:/usr/bin:/bin:/usr/sbin:/sbin"
        keep_alive true
        log_path var/"log/jevonsd.log"
        error_log_path var/"log/jevonsd.log"
      end
      ```

      If a shared PATH constant is later defined in the tap (sibling formulas will need the same string), refactor to reference it.
    origin: forked-from spyder PATH-bug investigation in ~/think on 2026-04-27 (homebrew-tap-wide audit)
    discovered: 2026-04-27
