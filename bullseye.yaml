  T21:
    name: Wispr Flow dictation into the Jevons UI produces full sentences
    status: identified
    value: 0.0
    cost: 0.0
    acceptance:
    - Dictating into the empty Jevons UI input via Wispr Flow produces capitalised, punctuated sentences matching its behaviour in the Claude CLI
    - Behaviour is consistent regardless of whether the field is empty or has draft text
    context: "Wispr Flow currently outputs lowercase, unpunctuated fragments when dictating into the empty Jevons UI input (\"are you able to track jevons po progress\") but produces full sentences in the Claude CLI (\"Are you able to track Jevons PO progress?\"). \n\nDiagnostic finding: if the Jevons UI input contains ANY sentence-shaped text (even a single full stop), Wispr Flow flips to document mode and produces proper sentences. Empty field → chat-casual; non-empty sentence-shaped field → document. So Wispr Flow reads the focused field's accessibility context and matches its existing style.\n\nThis explains the CLI: terminal scrollback is one text buffer where prior turns (full sentences) form the visible context. The Jevons UI input is a DOM element separated from the message history, so empty-field dictation has no anchor.\n\nLikely fix shapes:\n1. Bridge the accessibility context — `aria-describedby` on the input pointing at the history, or render the input inside the same scrolling region. Native chat-UI pattern.\n2. Pre-seed the input with an invisible/zero-width sentence-shaped string Wispr Flow reads as continuation context. Hacky but trivial.\n\nEarlier hypothesis (single-line input vs. textarea) is NOT the dominant cause; can be evaluated separately for UX reasons but won't fix the dictation issue on its own."
