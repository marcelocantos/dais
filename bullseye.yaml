    context: 'Currently /ws/voice is proxied through jevonsd: browser to jevonsd to Grok via two WebSockets. For the laptop dev path that''s fine — jevonsd is on localhost and the only WAN hop is jevonsd-to-Grok. For the iPad-in-car deployment (the primary target, exposed via ngrok), audio bounces through the home Mac: phone to ngrok to home jevonsd to Grok and back, doubling residential uplink consumption (~64 KB/s × 2 = ~128 KB/s through home ISP per active voice session). Direct path lets the iPad talk to Grok over its own cellular/wifi; home ISP only carries small Claude/jevon control messages. Also reduces latency by avoiding the home network as an intermediate stop and makes voice resilient to home Wi-Fi flakiness. Approach: reimplement claudia/grok in JS (~200 lines: WS open, session config, audio framing, JSON event switch). Add ephemeral-token endpoint on jevonsd (or accept subprotocol-baked key for personal devices). Move send_to_jevons round-tripping to the browser, with the chat WS as the jevon/browser link. Not urgent — laptop dev path works fine via the proxy. Raise once iPad becomes the primary deployment again.'
