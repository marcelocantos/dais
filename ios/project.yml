name: Jevon
options:
  bundleIdPrefix: com.marcelocantos
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "16.0"

settings:
  base:
    SWIFT_VERSION: "6.0"
    DEVELOPMENT_TEAM: ""

targets:
  Jevon:
    type: application
    platform: iOS
    sources:
      - path: Jevon
    settings:
      base:
        INFOPLIST_FILE: Jevon/Info.plist
        PRODUCT_BUNDLE_IDENTIFIER: com.marcelocantos.jevon
        TARGETED_DEVICE_FAMILY: "1,2"
        SWIFT_STRICT_CONCURRENCY: complete
