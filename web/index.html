<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Jevon</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>&#x1F916;</text></svg>">
<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@xterm/xterm/lib/xterm.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@xterm/addon-fit/lib/addon-fit.min.js"></script>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@xterm/xterm/css/xterm.min.css">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root, [data-theme="dark"] {
  --bg: #0c0c0f;
  --surface: #14141a;
  --surface-raised: #1c1c24;
  --surface-high: #24242e;
  --border: rgba(255,255,255,0.06);
  --border-focus: rgba(255,255,255,0.15);
  --text: #d4d4dc;
  --text-dim: #6e6e7a;
  --text-muted: #44444e;
  --accent: #8b7cf6;
  --accent-dim: rgba(139,124,246,0.15);
  --user-bg: rgba(139,124,246,0.12);
  --user-border: rgba(139,124,246,0.25);
  --green: #34d399;
  --red: #f87171;
  --amber: #fbbf24;
  --heading: #fff;
  --strong: #fff;
  --dot-on-glow: rgba(52,211,153,0.4);
  --dot-off-glow: rgba(248,113,113,0.3);
  --agent-dot-glow: rgba(52,211,153,0.3);
  --mono: 'JetBrains Mono', 'SF Mono', Menlo, monospace;
  --sans: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
  --radius: 10px;
}

[data-theme="light"] {
  --bg: #f8f8fa;
  --surface: #ffffff;
  --surface-raised: #f0f0f4;
  --surface-high: #e4e4ea;
  --border: rgba(0,0,0,0.08);
  --border-focus: rgba(0,0,0,0.18);
  --text: #2c2c34;
  --text-dim: #6e6e7a;
  --text-muted: #a0a0aa;
  --accent: #6d5dd3;
  --accent-dim: rgba(109,93,211,0.1);
  --user-bg: rgba(109,93,211,0.08);
  --user-border: rgba(109,93,211,0.2);
  --green: #10b981;
  --red: #ef4444;
  --amber: #d97706;
  --heading: #1a1a22;
  --strong: #1a1a22;
  --dot-on-glow: rgba(16,185,129,0.3);
  --dot-off-glow: rgba(239,68,68,0.2);
  --agent-dot-glow: rgba(16,185,129,0.25);
}

* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: var(--sans); background: var(--bg); color: var(--text); height: 100vh; display: flex; flex-direction: column; font-size: 14px; letter-spacing: -0.01em; -webkit-font-smoothing: antialiased; }

/* Status bar */
#status { padding: 6px 20px; font-size: 11px; font-weight: 500; color: var(--text-dim); background: var(--surface); border-bottom: 1px solid var(--border); flex-shrink: 0; display: flex; align-items: center; gap: 8px; letter-spacing: 0.02em; text-transform: uppercase; }
.dot { width: 6px; height: 6px; border-radius: 50%; }
.dot.on { background: var(--green); box-shadow: 0 0 6px var(--dot-on-glow); }
.dot.off { background: var(--red); box-shadow: 0 0 6px var(--dot-off-glow); }

#main { flex: 1; display: flex; overflow: hidden; }

/* Chat pane */
#chat-pane { flex: 1; display: flex; flex-direction: column; min-width: 0; }
#messages { flex: 1; overflow-y: auto; padding: 24px 20px; display: flex; flex-direction: column; gap: 8px; scrollbar-width: thin; scrollbar-color: var(--surface-high) transparent; }
#messages::-webkit-scrollbar { width: 6px; }
#messages::-webkit-scrollbar-track { background: transparent; }
#messages::-webkit-scrollbar-thumb { background: var(--surface-high); border-radius: 3px; }

.msg { max-width: 85%; padding: 10px 16px; border-radius: var(--radius); line-height: 1.6; font-size: 14px; }
.msg.user { align-self: flex-end; background: var(--user-bg); color: var(--text); border: 1px solid var(--user-border); white-space: pre-wrap; word-wrap: break-word; }
.msg.jevon { align-self: flex-start; background: transparent; color: var(--text); white-space: normal; padding: 10px 4px; }

/* Markdown in agent responses */
.msg.jevon p { margin: 0.5em 0; }
.msg.jevon p:first-child { margin-top: 0; }
.msg.jevon p:last-child { margin-bottom: 0; }
.msg.jevon code { background: var(--surface-raised); padding: 2px 6px; border-radius: 4px; font-family: var(--mono); font-size: 0.88em; color: var(--accent); }
.msg.jevon pre { background: var(--surface); border: 1px solid var(--border); padding: 12px 14px; border-radius: 8px; overflow-x: auto; margin: 0.6em 0; }
.msg.jevon pre code { background: none; padding: 0; color: var(--text); }
.msg.jevon ul, .msg.jevon ol { padding-left: 1.5em; margin: 0.5em 0; }
.msg.jevon li { margin: 0.2em 0; }
.msg.jevon h1, .msg.jevon h2, .msg.jevon h3 { margin: 0.8em 0 0.3em; font-weight: 600; color: var(--heading); }
.msg.jevon h1 { font-size: 1.1em; }
.msg.jevon h2 { font-size: 1.05em; }
.msg.jevon h3 { font-size: 1em; }
.msg.jevon blockquote { border-left: 2px solid var(--accent); padding-left: 12px; margin: 0.5em 0; color: var(--text-dim); }
.msg.jevon table { border-collapse: collapse; margin: 0.5em 0; font-size: 0.9em; }
.msg.jevon th, .msg.jevon td { border: 1px solid var(--border); padding: 6px 10px; }
.msg.jevon th { background: var(--surface); font-weight: 500; }
.msg.jevon strong { color: var(--strong); font-weight: 600; }
.msg.jevon a { color: var(--accent); text-decoration: none; }
.msg.jevon a:hover { text-decoration: underline; }

/* Input bar */
#input-bar { display: flex; gap: 10px; padding: 16px 20px; background: var(--surface); border-top: 1px solid var(--border); }
#input { flex: 1; padding: 11px 16px; border-radius: 8px; border: 1px solid var(--border); background: var(--bg); color: var(--text); font-size: 14px; font-family: var(--sans); outline: none; transition: border-color 0.15s; }
#input::placeholder { color: var(--text-muted); }
#input:focus { border-color: var(--accent); box-shadow: 0 0 0 2px var(--accent-dim); }
#send { padding: 11px 22px; border-radius: 8px; border: none; background: var(--accent); color: #fff; font-size: 13px; font-weight: 600; font-family: var(--sans); cursor: pointer; letter-spacing: 0.02em; transition: opacity 0.15s; }
#send:hover { opacity: 0.85; }
#send:disabled { opacity: 0.3; cursor: not-allowed; }
#voice-btn { padding: 11px 16px; border-radius: 8px; border: 1px solid var(--border); background: var(--bg); color: var(--text-dim); font-size: 16px; cursor: pointer; transition: all 0.15s; line-height: 1; position: relative; }
#voice-btn:hover { border-color: var(--accent); color: var(--accent); }
#voice-btn.active { background: var(--red); color: #fff; border-color: var(--red); box-shadow: 0 0 12px rgba(248,113,113,0.5); animation: pulse 1.5s ease-in-out infinite; }
#voice-btn.connecting { background: var(--amber); color: #fff; border-color: var(--amber); animation: pulse 1.5s ease-in-out infinite; cursor: wait; }
@keyframes pulse { 0%,100% { box-shadow: 0 0 4px 0 rgba(248,113,113,0.4); } 50% { box-shadow: 0 0 12px 4px rgba(248,113,113,0.15); } }
#voice-status { display: none; align-items: center; gap: 5px; margin-left: 8px; font-size: 11px; }
#voice-status.on { display: flex; color: var(--red); }
#voice-status .voice-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--red); animation: voice-blink 1s ease-in-out infinite; }
@keyframes voice-blink { 0%,100% { opacity: 1; } 50% { opacity: 0.3; } }
.voice-indicator { font-size: 11px; color: var(--text-muted); padding: 4px 4px; align-self: center; font-style: italic; }

/* Collapsible turn details */
.turn-details { align-self: flex-start; max-width: 85%; margin: 2px 0 0 0; }
.turn-details summary { cursor: pointer; color: var(--text-muted); padding: 4px 4px; font-size: 16px; list-style: none; user-select: none; line-height: 1; }
.turn-details summary::before { content: '\25b8'; margin-right: 3px; display: inline-block; transition: transform 0.15s; font-size: 16px; }
.turn-details[open] summary::before { transform: rotate(90deg); }
.turn-details summary::-webkit-details-marker { display: none; }
.msg-time { font-size: 10px; color: var(--text-muted); margin-top: 4px; padding-top: 2px; font-family: var(--mono); letter-spacing: -0.02em; user-select: none; line-height: 1; }
.msg.user .msg-time { text-align: right; }
.turn-details summary:hover { color: var(--text-dim); }
.turn-details[open] summary { margin-bottom: 4px; }
.turn-details .turn-items { display: flex; flex-direction: column; gap: 1px; padding: 4px 10px; border-left: 1px solid var(--border); margin-left: 6px; }
.turn-item { font-family: var(--mono); font-size: 11px; padding: 1px 0; letter-spacing: -0.02em; }
.turn-item.tool-use { color: var(--amber); }
.turn-item.tool-result { color: var(--text-dim); }

/* Right pane: agents */
#activity-pane { width: 420px; flex-shrink: 0; display: flex; flex-direction: column; background: var(--surface); border-left: 1px solid var(--border); }
#activity-header { padding: 10px 16px; font-size: 10px; font-weight: 600; color: var(--text-muted); border-bottom: 1px solid var(--border); text-transform: uppercase; letter-spacing: 0.08em; }

/* Theme toggle */
#theme-toggle { margin-left: auto; display: flex; gap: 2px; background: var(--surface-raised); border-radius: 5px; padding: 2px; }
#theme-toggle button { border: none; background: none; color: var(--text-muted); font-size: 11px; padding: 2px 6px; border-radius: 3px; cursor: pointer; line-height: 1; }
#theme-toggle button:hover { color: var(--text-dim); }
#theme-toggle button.active { background: var(--accent-dim); color: var(--accent); }
#agents { flex: 1; overflow-y: auto; padding: 8px 12px; }
.agent-node { padding: 6px 8px; border-radius: 6px; margin-bottom: 1px; display: flex; align-items: center; gap: 8px; transition: background 0.1s; }
.agent-node:hover { background: var(--surface-raised); }
.agent-node .agent-dot { width: 5px; height: 5px; border-radius: 50%; flex-shrink: 0; }
.agent-node .agent-dot.running { background: var(--green); box-shadow: 0 0 4px var(--agent-dot-glow); }
.agent-node .agent-dot.stopped { background: var(--text-muted); }
.agent-node .agent-name { color: var(--text); font-size: 13px; font-weight: 500; }
.agent-node .agent-dir { color: var(--text-muted); font-size: 10px; margin-left: auto; font-family: var(--mono); letter-spacing: -0.02em; }
.agent-children { padding-left: 14px; border-left: 1px solid var(--border); margin-left: 10px; }

/* Terminal viewer */
#terminal-header { padding: 6px 16px; font-size: 10px; font-weight: 600; color: var(--text-muted); border-top: 1px solid var(--border); border-bottom: 1px solid var(--border); text-transform: uppercase; letter-spacing: 0.08em; display: none; }
#terminal-container { flex: 1; min-height: 0; overflow: hidden; display: none; }
#terminal-container .xterm { height: 100%; }
.agent-node { cursor: pointer; }
.agent-node.selected { background: var(--accent-dim); }
</style>
</head>
<body>
<div id="status"><span class="dot off" id="dot"></span><span id="status-text">connecting</span><span id="voice-status"><span class="voice-dot"></span><span id="voice-status-text">listening</span></span><div id="theme-toggle"><button data-t="light" title="Light">&#9788;</button><button data-t="system" title="System" class="active">&#9680;</button><button data-t="dark" title="Dark">&#9790;</button></div></div>
<div id="main">
  <div id="chat-pane">
    <div id="messages"></div>
    <div id="input-bar">
      <input id="input" placeholder="Talk to Jevon..." autocomplete="off">
      <button id="send" disabled>Send</button>
      <button id="voice-btn" title="Hold to talk (or click to toggle)">&#127908;</button>
    </div>
  </div>
  <div id="activity-pane">
    <div id="activity-header">Agents</div>
    <div id="agents"></div>
    <div id="terminal-header"></div>
    <div id="terminal-container"></div>
  </div>
</div>
<script>
const msgs = document.getElementById('messages');
const input = document.getElementById('input');
const sendBtn = document.getElementById('send');
const dot = document.getElementById('dot');
const sTxt = document.getElementById('status-text');
const agentsEl = document.getElementById('agents');
let ws;

let turnDetails = null;
let turnItems = null;
let turnCount = 0;

function connect() {
  const h = location.hostname === 'localhost' ? '127.0.0.1:'+location.port : location.host;
  ws = new WebSocket((location.protocol==='https:'?'wss:':'ws:')+'//'+h+'/ws/chat');
  ws.onopen = () => { const v=input.value; dot.className='dot on'; sTxt.textContent='connected'; sendBtn.disabled=false; msgs.innerHTML=''; turnDetails=null; turnItems=null; turnCount=0; input.value=v; };
  ws.onclose = () => { dot.className='dot off'; sTxt.textContent='reconnecting'; sendBtn.disabled=true; setTimeout(connect,2000); };
  ws.onmessage = e => { try{handle(JSON.parse(e.data))}catch(x){console.error(x)} };
}

function handle(m) {
  const typ = m.type;

  const msgTs = m.timestamp ? new Date(m.timestamp).getTime() : Date.now();

  if (typ==='user') {
    const content = m.message?.content;
    if (typeof content === 'string') {
      closeTurn();
      addMsg('user', content, msgTs);
      startTurn();
    } else if (Array.isArray(content)) {
      content.forEach(c => {
        if (c.type==='tool_result') {
          const inner = c.content;
          if (typeof inner === 'string') addTurnItem('tool-result', truncate(inner, 120));
          else if (Array.isArray(inner)) inner.forEach(ic => {
            if (ic.type==='text' && ic.text) addTurnItem('tool-result', truncate(ic.text, 120));
          });
        }
      });
    }
  } else if (typ==='assistant') {
    const content = m.message?.content;
    if (!Array.isArray(content)) return;
    const hasText = content.some(c => c.type==='text' && c.text);
    content.forEach(c => {
      if (c.type==='tool_use') {
        addTurnItem('tool-use', c.name + (c.input ? ': ' + summariseInput(c.input) : ''));
      }
    });
    if (hasText) {
      closeTurn();
      content.forEach(c => {
        if (c.type==='text' && c.text) addMsg('jevon', c.text, msgTs);
      });
      input.focus();
    }
  } else if (typ==='tool_result' || typ==='result') {
    const content = m.content || m.message?.content;
    if (Array.isArray(content)) {
      content.forEach(c => {
        if (c.type==='text' && c.text) addTurnItem('tool-result', truncate(c.text, 120));
      });
    } else if (typeof content === 'string') {
      addTurnItem('tool-result', truncate(content, 120));
    }
  } else if (typ==='system') {
    closeTurn();
  }
}

function startTurn() {
  turnDetails = document.createElement('details');
  turnDetails.className = 'turn-details';
  turnDetails.open = true;
  const summary = document.createElement('summary');
  turnDetails.appendChild(summary);
  turnItems = document.createElement('div');
  turnItems.className = 'turn-items';
  turnDetails.appendChild(turnItems);
  msgs.appendChild(turnDetails);
  turnCount++;
  scrollDown();
}

function closeTurn() {
  if (!turnDetails) return;
  const n = turnItems ? turnItems.children.length : 0;
  if (n === 0) {
    turnDetails.remove();
  } else {
    turnDetails.open = false;
  }
  turnDetails = null;
  turnItems = null;
}

function addTurnItem(cls, text) {
  if (!turnItems) startTurn();
  const d = document.createElement('div');
  d.className = 'turn-item ' + cls;
  d.textContent = text;
  turnItems.appendChild(d);
  scrollDown();
}

function addMsg(role, text, when) {
  const d = document.createElement('div');
  d.className = 'msg ' + role;
  if (role === 'jevon') {
    d.innerHTML = marked.parse(text);
  } else {
    d.textContent = text;
  }
  const ms = when || Date.now();
  const ts = document.createElement('div');
  ts.className = 'msg-time';
  ts.dataset.ts = ms;
  ts.textContent = relTime(ms);
  d.appendChild(ts);
  msgs.appendChild(d);
  scrollDown();
  return d;
}

// Agent tree
function refreshAgents() {
  fetch('/api/agents').then(r=>r.json()).then(agents => {
    agentsEl.innerHTML = '';
    const byParent = {};
    agents.forEach(a => {
      const p = a.parent || '';
      (byParent[p] = byParent[p] || []).push(a);
    });
    renderTree(byParent, '', agentsEl);
  }).catch(()=>{});
}
function renderTree(byParent, parent, container) {
  const children = byParent[parent] || [];
  children.forEach(a => {
    const node = document.createElement('div');
    node.className = 'agent-node' + (a.name === selectedAgent ? ' selected' : '');
    node.dataset.agent = a.name;
    node.innerHTML = '<span class="agent-dot '+a.status+'"></span>'
      + '<span class="agent-name">'+escHtml(a.name)+'</span>'
      + '<span class="agent-dir">'+escHtml(shortDir(a.workdir))+'</span>';
    node.onclick = () => selectAgent(a.name);
    container.appendChild(node);
    if (byParent[a.name]) {
      const sub = document.createElement('div');
      sub.className = 'agent-children';
      container.appendChild(sub);
      renderTree(byParent, a.name, sub);
    }
  });
}
function shortDir(d) {
  return d.replace(/^\/Users\/[^/]+/, '~').replace(/\/work\/github\.com\//,'/');
}
setInterval(refreshAgents, 3000);
refreshAgents();

let autoScroll = true;
msgs.addEventListener('scroll', () => {
  autoScroll = msgs.scrollTop + msgs.clientHeight >= msgs.scrollHeight - 30;
});
function scrollDown() { if (autoScroll) msgs.scrollTop = msgs.scrollHeight; }
function escHtml(s) { const d=document.createElement('span'); d.textContent=s; return d.innerHTML; }
function truncate(s, n) { return s.length > n ? s.slice(0, n-3) + '...' : s; }
function summariseInput(obj) {
  if (typeof obj === 'string') return truncate(obj, 60);
  const keys = Object.keys(obj);
  if (keys.length === 0) return '';
  const v = obj[keys[0]];
  return typeof v === 'string' ? truncate(v, 60) : keys.join(', ');
}

function relTime(ms) {
  const s = Math.floor((Date.now() - ms) / 1000);
  if (s < 60) return 'now';
  const m = Math.floor(s / 60);
  if (m < 60) return m + 'm';
  const h = Math.floor(m / 60);
  if (h < 24) return h + 'h';
  const d = Math.floor(h / 24);
  if (d < 7) return d + 'd';
  const dt = new Date(ms);
  const now = new Date();
  if (dt.getFullYear() === now.getFullYear()) {
    const days = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
    const months = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
    if (d < 14) return days[dt.getDay()] + ' ' + String(dt.getHours()).padStart(2,'0') + ':' + String(dt.getMinutes()).padStart(2,'0');
    return months[dt.getMonth()] + ' ' + dt.getDate();
  }
  return dt.toLocaleDateString();
}
setInterval(() => {
  document.querySelectorAll('.msg-time[data-ts]').forEach(el => {
    el.textContent = relTime(parseInt(el.dataset.ts));
  });
}, 30000);

function send() {
  const t = input.value.trim();
  if (!t||!ws||ws.readyState!==1) return;
  ws.send(t);
  input.value = '';
}

input.addEventListener('keydown', e => { if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();send();} });
sendBtn.addEventListener('click', send);
input.focus();
connect();

document.addEventListener('keydown', e => {
  if (e.key === 'PageUp') { e.preventDefault(); msgs.scrollBy(0, -msgs.clientHeight * 0.8); }
  if (e.key === 'PageDown') { e.preventDefault(); msgs.scrollBy(0, msgs.clientHeight * 0.8); }
});

// Theme toggle.
function applyTheme(pref) {
  const html = document.documentElement;
  if (pref === 'system') {
    html.removeAttribute('data-theme');
    const mq = window.matchMedia('(prefers-color-scheme: light)');
    html.setAttribute('data-theme', mq.matches ? 'light' : 'dark');
    mq.onchange = e => { if (localStorage.getItem('theme')==='system') html.setAttribute('data-theme', e.matches?'light':'dark'); };
  } else {
    html.setAttribute('data-theme', pref);
  }
  document.querySelectorAll('#theme-toggle button').forEach(b => b.classList.toggle('active', b.dataset.t===pref));
}
document.getElementById('theme-toggle').addEventListener('click', e => {
  const btn = e.target.closest('button');
  if (!btn) return;
  document.cookie = 'theme='+btn.dataset.t+';path=/;max-age=31536000';
  applyTheme(btn.dataset.t);
});
applyTheme((document.cookie.match(/(?:^|; )theme=([^;]*)/)||[])[1] || 'system');

// Terminal viewer.
const termHeader = document.getElementById('terminal-header');
const termContainer = document.getElementById('terminal-container');
let term = null;
let termWs = null;
let termFit = null;
let selectedAgent = null;

function selectAgent(name) {
  if (selectedAgent === name) {
    // Deselect.
    closeTerminal();
    return;
  }
  selectedAgent = name;
  document.querySelectorAll('.agent-node').forEach(n => n.classList.toggle('selected', n.dataset.agent === name));
  openTerminal(name);
}

function openTerminal(name) {
  closeTerminal();
  termHeader.textContent = name;
  termHeader.style.display = 'block';
  termContainer.style.display = 'block';

  term = new Terminal({
    fontFamily: 'JetBrains Mono, SF Mono, Menlo, monospace',
    fontSize: 12,
    theme: {
      background: '#0c0c0f',
      foreground: '#d4d4dc',
      cursor: '#8b7cf6',
      selectionBackground: 'rgba(139,124,246,0.3)',
    },
    scrollback: 10000,
    convertEol: true,
  });
  termFit = new FitAddon.FitAddon();
  term.loadAddon(termFit);
  term.open(termContainer);
  termFit.fit();

  const h = location.hostname === 'localhost' ? '127.0.0.1:'+location.port : location.host;
  const cols = term.cols;
  const rows = term.rows;
  termWs = new WebSocket((location.protocol==='https:'?'wss:':'ws:')+'//'+h+'/ws/agent-terminal?name='+encodeURIComponent(name)+'&cols='+cols+'&rows='+rows);
  termWs.binaryType = 'arraybuffer';
  termWs.onmessage = e => {
    if (e.data instanceof ArrayBuffer) {
      term.write(new Uint8Array(e.data));
    } else {
      term.write(e.data);
    }
  };
  termWs.onclose = () => { /* terminal closed */ };

  // Handle resize.
  const ro = new ResizeObserver(() => {
    if (termFit) {
      termFit.fit();
      if (termWs && termWs.readyState === 1) {
        termWs.send(JSON.stringify({type:'resize', cols:term.cols, rows:term.rows}));
      }
    }
  });
  ro.observe(termContainer);
  termContainer._ro = ro;
}

function closeTerminal() {
  selectedAgent = null;
  if (termWs) { termWs.close(); termWs = null; }
  if (term) { term.dispose(); term = null; }
  if (termContainer._ro) { termContainer._ro.disconnect(); termContainer._ro = null; }
  termHeader.style.display = 'none';
  termContainer.style.display = 'none';
  termContainer.innerHTML = '';
  document.querySelectorAll('.agent-node').forEach(n => n.classList.remove('selected'));
}

// Preserve input across hot reloads.
const savedInput = sessionStorage.getItem('jevon-input');
if (savedInput) { input.value = savedInput; sessionStorage.removeItem('jevon-input'); }

// Voice bridge.
const voiceBtn = document.getElementById('voice-btn');
const voiceStatus = document.getElementById('voice-status');
const voiceStatusText = document.getElementById('voice-status-text');
let voiceWs = null;
let voiceActive = false;
let audioCtx = null;
let mediaStream = null;
let scriptNode = null;

voiceBtn.addEventListener('click', () => {
  if (voiceActive) stopVoice(); else startVoice();
});

async function startVoice() {
  voiceBtn.classList.add('connecting');

  try {
    // Get mic permission.
    mediaStream = await navigator.mediaDevices.getUserMedia({
      audio: { sampleRate: 48000, channelCount: 1, echoCancellation: true, noiseSuppression: true }
    });

    // Connect to voice WebSocket.
    const h = location.hostname === 'localhost' ? '127.0.0.1:'+location.port : location.host;
    voiceWs = new WebSocket((location.protocol==='https:'?'wss:':'ws:')+'//'+h+'/ws/voice');
    voiceWs.binaryType = 'arraybuffer';

    voiceWs.onopen = () => {
      voiceBtn.classList.remove('connecting');
      voiceBtn.classList.add('active');
      voiceActive = true;
      voiceStatus.classList.add('on');
      voiceStatusText.textContent = 'connecting to grok...';
      startAudioCapture();
    };

    voiceWs.onmessage = e => {
      if (e.data instanceof ArrayBuffer) {
        playAudio(new Int16Array(e.data));
      } else {
        try {
          const msg = JSON.parse(e.data);
          handleVoiceMsg(msg);
        } catch(x) { console.error('voice msg parse', x); }
      }
    };

    voiceWs.onclose = () => {
      stopVoice();
    };

    voiceWs.onerror = () => {
      stopVoice();
    };
  } catch(err) {
    console.error('voice start failed', err);
    voiceBtn.classList.remove('connecting');
    alert('Mic access denied or voice not available: ' + err.message);
  }
}

function stopVoice() {
  voiceActive = false;
  voiceBtn.classList.remove('active', 'connecting');
  voiceStatus.classList.remove('on');

  if (scriptNode) { scriptNode.disconnect(); scriptNode = null; }
  if (mediaStream) { mediaStream.getTracks().forEach(t => t.stop()); mediaStream = null; }
  if (voiceWs) { voiceWs.close(); voiceWs = null; }
}

async function startAudioCapture() {
  audioCtx = audioCtx || new AudioContext({ sampleRate: 48000 });
  if (audioCtx.state === 'suspended') await audioCtx.resume();
  console.log('voice: AudioContext state='+audioCtx.state+' sampleRate='+audioCtx.sampleRate);
  const source = audioCtx.createMediaStreamSource(mediaStream);

  // ScriptProcessorNode for raw PCM access. Deprecated but universally supported.
  scriptNode = audioCtx.createScriptProcessor(4096, 1, 1);
  scriptNode.onaudioprocess = e => {
    if (!voiceWs || voiceWs.readyState !== 1) return;
    const input = e.inputBuffer.getChannelData(0);
    // Check if mic is actually producing audio.
    let maxAmp = 0;
    for (let i = 0; i < input.length; i += 100) maxAmp = Math.max(maxAmp, Math.abs(input[i]));
    if (!scriptNode._logged) { console.log('voice: mic sampleRate='+audioCtx.sampleRate+' bufLen='+input.length+' maxAmp='+maxAmp.toFixed(4)); scriptNode._logged = true; }
    if (maxAmp < 0.001) return; // Skip silence to reduce bandwidth.
    // Downsample from 48kHz to 24kHz and convert to PCM16.
    const ratio = audioCtx.sampleRate / 24000;
    const outLen = Math.floor(input.length / ratio);
    const pcm16 = new Int16Array(outLen);
    for (let i = 0; i < outLen; i++) {
      const idx = Math.floor(i * ratio);
      const s = Math.max(-1, Math.min(1, input[idx]));
      pcm16[i] = s < 0 ? s * 0x8000 : s * 0x7FFF;
    }
    voiceWs.send(pcm16.buffer);
  };

  source.connect(scriptNode);
  scriptNode.connect(audioCtx.destination); // Required for processing to work.
}

// Audio playback queue for Grok's TTS output.
let playbackQueue = [];
let isPlaying = false;

function playAudio(pcm16) {
  audioCtx = audioCtx || new AudioContext({ sampleRate: 24000 });
  // Convert PCM16 to float32.
  const float32 = new Float32Array(pcm16.length);
  for (let i = 0; i < pcm16.length; i++) {
    float32[i] = pcm16[i] / (pcm16[i] < 0 ? 0x8000 : 0x7FFF);
  }
  playbackQueue.push(float32);
  if (!isPlaying) drainPlayback();
}

function drainPlayback() {
  if (playbackQueue.length === 0) { isPlaying = false; return; }
  isPlaying = true;
  const samples = playbackQueue.shift();
  const buf = audioCtx.createBuffer(1, samples.length, 24000);
  buf.copyToChannel(samples, 0);
  const src = audioCtx.createBufferSource();
  src.buffer = buf;
  src.connect(audioCtx.destination);
  src.onended = drainPlayback;
  src.start();
}

function handleVoiceMsg(msg) {
  if (msg.type === 'user_transcript') {
    addMsg('user', msg.text + ' \u{1F3A4}');
    voiceStatusText.textContent = 'listening';
  } else if (msg.type === 'assistant_transcript') {
    voiceStatusText.textContent = 'speaking';
    // Accumulate transcript deltas into a streaming message.
    if (!handleVoiceMsg._assistantEl) {
      handleVoiceMsg._assistantEl = addMsg('jevon', '');
    }
    handleVoiceMsg._assistantBuf = (handleVoiceMsg._assistantBuf || '') + msg.text;
    // Update the message content (plain text, not markdown, since it streams).
    const el = handleVoiceMsg._assistantEl;
    const timeEl = el.querySelector('.msg-time');
    el.textContent = handleVoiceMsg._assistantBuf;
    if (timeEl) el.appendChild(timeEl);
    scrollDown();
  } else if (msg.type === 'assistant_transcript_done') {
    // Finalize: re-render as markdown.
    if (handleVoiceMsg._assistantEl && handleVoiceMsg._assistantBuf) {
      const el = handleVoiceMsg._assistantEl;
      const timeEl = el.querySelector('.msg-time');
      el.innerHTML = marked.parse(handleVoiceMsg._assistantBuf);
      if (timeEl) el.appendChild(timeEl);
    }
    handleVoiceMsg._assistantEl = null;
    handleVoiceMsg._assistantBuf = '';
  } else if (msg.type === 'status') {
    if (msg.status === 'ready') {
      voiceStatusText.textContent = 'listening';
    } else {
      voiceStatusText.textContent = msg.status;
    }
  } else if (msg.type === 'error') {
    console.error('voice error:', msg.error);
    voiceStatusText.textContent = 'error';
    const d = document.createElement('div');
    d.className = 'msg jevon';
    d.style.color = 'var(--red)';
    d.style.border = '1px solid var(--red)';
    d.style.borderRadius = 'var(--radius)';
    d.style.padding = '10px 16px';
    d.textContent = msg.error;
    msgs.appendChild(d);
    scrollDown();
  }
}

// Hot reload.
(function hotReload() {
  const rh = location.hostname === 'localhost' ? '127.0.0.1:'+location.port : location.host;
  const rws = new WebSocket((location.protocol==='https:'?'wss:':'ws:')+'//'+rh+'/ws/reload');
  rws.onmessage = () => { sessionStorage.setItem('jevon-input', input.value); location.reload(); };
  rws.onclose = () => setTimeout(hotReload, 2000);
})();
</script>
</body>
