<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Jevons — Chat</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>&#x1F916;</text></svg>">
<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@xterm/xterm/lib/xterm.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@xterm/addon-fit/lib/addon-fit.min.js"></script>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@xterm/xterm/css/xterm.min.css">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root, [data-theme="dark"] {
  /* Red theme — tuned for in-car visibility. Backgrounds are lifted
     from near-black so panels are distinguishable; text is brighter
     for contrast at arm's length in daylight. Accent is a saturated
     red, with red-tinted surfaces and borders to carry the theme. */
  --bg: #1a0e0e;
  --surface: #261515;
  --surface-raised: #311c1c;
  --surface-high: #3d2424;
  --border: rgba(255,180,180,0.12);
  --border-focus: rgba(248,113,113,0.45);
  --text: #f0e8e8;
  --text-dim: #b4a0a0;
  --text-muted: #806868;
  --accent: #ef4444;
  --accent-dim: rgba(239,68,68,0.18);
  --user-bg: rgba(239,68,68,0.16);
  --user-border: rgba(239,68,68,0.4);
  --green: #4ade80;
  --red: #ef4444;
  --amber: #fbbf24;
  --heading: #fff5f5;
  --strong: #ffffff;
  --dot-on-glow: rgba(74,222,128,0.5);
  --dot-off-glow: rgba(239,68,68,0.5);
  --agent-dot-glow: rgba(74,222,128,0.4);
  --mono: 'JetBrains Mono', 'SF Mono', Menlo, monospace;
  --sans: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
  --radius: 10px;
}

[data-theme="light"] {
  --bg: #f8f8fa;
  --surface: #ffffff;
  --surface-raised: #f0f0f4;
  --surface-high: #e4e4ea;
  --border: rgba(0,0,0,0.08);
  --border-focus: rgba(0,0,0,0.18);
  --text: #2c2c34;
  --text-dim: #6e6e7a;
  --text-muted: #a0a0aa;
  --accent: #6d5dd3;
  --accent-dim: rgba(109,93,211,0.1);
  --user-bg: rgba(109,93,211,0.08);
  --user-border: rgba(109,93,211,0.2);
  --green: #10b981;
  --red: #ef4444;
  --amber: #d97706;
  --heading: #1a1a22;
  --strong: #1a1a22;
  --dot-on-glow: rgba(16,185,129,0.3);
  --dot-off-glow: rgba(239,68,68,0.2);
  --agent-dot-glow: rgba(16,185,129,0.25);
}

* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: var(--sans); background: var(--bg); color: var(--text); height: 100vh; display: flex; flex-direction: column; font-size: 14px; letter-spacing: -0.01em; -webkit-font-smoothing: antialiased; }

/* Status bar */
#status { padding: 6px 20px; font-size: 11px; font-weight: 500; color: var(--text-dim); background: var(--surface); border-bottom: 1px solid var(--border); flex-shrink: 0; display: flex; align-items: center; gap: 8px; letter-spacing: 0.02em; text-transform: uppercase; }
.dot { width: 6px; height: 6px; border-radius: 50%; }
.dot.on { background: var(--green); box-shadow: 0 0 6px var(--dot-on-glow); }
.dot.off { background: var(--red); box-shadow: 0 0 6px var(--dot-off-glow); }

#main { flex: 1; display: flex; overflow: hidden; }

/* Chat pane */
#chat-pane { flex: 1; display: flex; flex-direction: column; min-width: 0; }
#messages { flex: 1; overflow-y: auto; padding: 24px 20px; display: flex; flex-direction: column; gap: 8px; scrollbar-width: thin; scrollbar-color: var(--surface-high) transparent; }
#messages::-webkit-scrollbar { width: 6px; }
#messages::-webkit-scrollbar-track { background: transparent; }
#messages::-webkit-scrollbar-thumb { background: var(--surface-high); border-radius: 3px; }

.msg { max-width: 85%; padding: 10px 16px; border-radius: var(--radius); line-height: 1.6; font-size: 14px; }
.msg.user { align-self: flex-end; background: var(--user-bg); color: var(--text); border: 1px solid var(--user-border); white-space: pre-wrap; word-wrap: break-word; }
.msg.jevons { align-self: flex-start; background: transparent; color: var(--text); white-space: normal; padding: 10px 4px; }

/* Markdown in agent responses */
.msg.jevons p { margin: 0.5em 0; }
.msg.jevons p:first-child { margin-top: 0; }
.msg.jevons p:last-child { margin-bottom: 0; }
.msg.jevons code { background: var(--surface-raised); padding: 2px 6px; border-radius: 4px; font-family: var(--mono); font-size: 0.88em; color: var(--accent); }
.msg.jevons pre { background: var(--surface); border: 1px solid var(--border); padding: 12px 14px; border-radius: 8px; overflow-x: auto; margin: 0.6em 0; }
.msg.jevons pre code { background: none; padding: 0; color: var(--text); }
.msg.jevons ul, .msg.jevons ol { padding-left: 1.5em; margin: 0.5em 0; }
.msg.jevons li { margin: 0.2em 0; }
.msg.jevons h1, .msg.jevons h2, .msg.jevons h3 { margin: 0.8em 0 0.3em; font-weight: 600; color: var(--heading); }
.msg.jevons h1 { font-size: 1.1em; }
.msg.jevons h2 { font-size: 1.05em; }
.msg.jevons h3 { font-size: 1em; }
.msg.jevons blockquote { border-left: 2px solid var(--accent); padding-left: 12px; margin: 0.5em 0; color: var(--text-dim); }
.msg.jevons table { border-collapse: collapse; margin: 0.5em 0; font-size: 0.9em; }
.msg.jevons th, .msg.jevons td { border: 1px solid var(--border); padding: 6px 10px; }
.msg.jevons th { background: var(--surface); font-weight: 500; }
.msg.jevons strong { color: var(--strong); font-weight: 600; }
.msg.jevons a { color: var(--accent); text-decoration: none; }
.msg.jevons a:hover { text-decoration: underline; }

/* Worker notes — out-of-band system messages from a delegated agent.
   Centred, dim, collapsible. Distinct from both user (right) and
   jevons (left) so the user can't mistake them for either side of
   the conversation. 🎯T23. */
.msg.worker { align-self: center; max-width: 78%; background: var(--surface); border: 1px solid var(--border); border-radius: 8px; padding: 6px 12px; font-size: 12px; color: var(--text-dim); margin: 6px auto; }
.msg.worker[open] { padding-bottom: 10px; }
.msg.worker summary { cursor: pointer; list-style: none; font-weight: 500; display: flex; gap: 8px; align-items: baseline; }
.msg.worker summary::-webkit-details-marker { display: none; }
.msg.worker summary::before { content: '▸'; color: var(--text-muted); font-size: 10px; transition: transform 0.15s; }
.msg.worker[open] summary::before { transform: rotate(90deg); }
.msg.worker .worker-agent { color: var(--accent); }
.msg.worker .worker-kind { color: var(--text-muted); font-size: 11px; }
.msg.worker .worker-task { color: var(--text-muted); font-family: var(--mono); font-size: 10px; margin-left: auto; }
.msg.worker .worker-body { white-space: pre-wrap; margin-top: 8px; padding-top: 6px; border-top: 1px solid var(--border); font-family: var(--mono); font-size: 11px; color: var(--text); max-height: 40vh; overflow-y: auto; }
.msg.worker.worker-failed { border-color: var(--red); }
.msg.worker.worker-failed .worker-kind { color: var(--red); }

/* Transient status notice — e.g., "didn't catch that" when an
   utterance fails to transcribe. Quieter than worker notes and
   doesn't carry a header/badge. */
.msg.status { align-self: center; max-width: 70%; background: transparent; border: none; padding: 4px 12px; font-size: 11px; color: var(--text-muted); font-style: italic; text-align: center; margin: 4px auto; }

/* Visually hidden but accessible to screen readers and STT tools
   that read surrounding context to infer dictation style. */
.sr-only { position: absolute; width: 1px; height: 1px; padding: 0; margin: -1px; overflow: hidden; clip: rect(0, 0, 0, 0); white-space: nowrap; border: 0; }

/* Input bar */
#input-bar { display: flex; gap: 10px; align-items: flex-end; padding: 16px 20px calc(16px + env(safe-area-inset-bottom)) 20px; background: var(--surface); border-top: 1px solid var(--border); }
/* Textarea (not <input>) so Wispr Flow and other STT tools detect a
   document-style input and produce full punctuated sentences. */
#input { flex: 1; padding: 11px 16px; border-radius: 8px; border: 1px solid var(--border); background: var(--bg); color: var(--text); font-size: 14px; font-family: var(--sans); outline: none; transition: border-color 0.15s; resize: none; line-height: 1.45; min-height: calc(1.45em + 22px); max-height: 40vh; overflow-y: auto; }
#input::placeholder { color: var(--text-muted); }
#input:focus { border-color: var(--accent); box-shadow: 0 0 0 2px var(--accent-dim); }
#send { padding: 11px 22px; border-radius: 8px; border: none; background: var(--accent); color: #fff; font-size: 13px; font-weight: 600; font-family: var(--sans); cursor: pointer; letter-spacing: 0.02em; transition: opacity 0.15s; }
#send:hover { opacity: 0.85; }
#send:disabled { opacity: 0.3; cursor: not-allowed; }
#voice-btn { padding: 11px 16px; border-radius: 8px; border: 1px solid var(--border); background: var(--bg); color: var(--text-dim); font-size: 16px; cursor: pointer; transition: all 0.15s; line-height: 1; position: relative; }
#voice-btn:hover { border-color: var(--accent); color: var(--accent); }
#voice-btn.active { background: var(--red); color: #fff; border-color: var(--red); box-shadow: 0 0 12px rgba(248,113,113,0.5); animation: pulse 1.5s ease-in-out infinite; }
#voice-btn.connecting { background: var(--amber); color: #fff; border-color: var(--amber); animation: pulse 1.5s ease-in-out infinite; cursor: wait; }
@keyframes pulse { 0%,100% { box-shadow: 0 0 4px 0 rgba(248,113,113,0.4); } 50% { box-shadow: 0 0 12px 4px rgba(248,113,113,0.15); } }
#voice-status { display: none; align-items: center; gap: 5px; margin-left: 8px; font-size: 11px; }
#voice-status.on { display: flex; color: var(--red); }
#voice-status .voice-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--red); animation: voice-blink 1s ease-in-out infinite; }
@keyframes voice-blink { 0%,100% { opacity: 1; } 50% { opacity: 0.3; } }
.voice-indicator { font-size: 11px; color: var(--text-muted); padding: 4px 4px; align-self: center; font-style: italic; }

/* Collapsible turn details */
.turn-details { align-self: flex-start; max-width: 85%; margin: 2px 0 0 0; }
.turn-details summary { cursor: pointer; color: var(--text-muted); padding: 4px 4px; font-size: 16px; list-style: none; user-select: none; line-height: 1; }
.turn-details summary::before { content: '\25b8'; margin-right: 3px; display: inline-block; transition: transform 0.15s; font-size: 16px; }
.turn-details[open] summary::before { transform: rotate(90deg); }
.turn-details summary::-webkit-details-marker { display: none; }
.msg-time { font-size: 10px; color: var(--text-muted); margin-top: 4px; padding-top: 2px; font-family: var(--mono); letter-spacing: -0.02em; user-select: none; line-height: 1; }
.msg.user .msg-time { text-align: right; }
.turn-details summary:hover { color: var(--text-dim); }
.turn-details[open] summary { margin-bottom: 4px; }
.turn-details .turn-items { display: flex; flex-direction: column; gap: 1px; padding: 4px 10px; border-left: 1px solid var(--border); margin-left: 6px; }
.turn-item { font-family: var(--mono); font-size: 11px; padding: 1px 0; letter-spacing: -0.02em; }
.turn-item.tool-use { color: var(--amber); }
.turn-item.tool-result { color: var(--text-dim); }

/* Right pane: agents */
#activity-pane { width: 420px; flex-shrink: 0; display: flex; flex-direction: column; background: var(--surface); border-left: 1px solid var(--border); }
#activity-header { padding: 10px 16px; font-size: 10px; font-weight: 600; color: var(--text-muted); border-bottom: 1px solid var(--border); text-transform: uppercase; letter-spacing: 0.08em; }

/* Theme toggle */
#theme-toggle { margin-left: auto; display: flex; gap: 2px; background: var(--surface-raised); border-radius: 5px; padding: 2px; }
#theme-toggle button { border: none; background: none; color: var(--text-muted); font-size: 11px; padding: 2px 6px; border-radius: 3px; cursor: pointer; line-height: 1; }
#theme-toggle button:hover { color: var(--text-dim); }
#theme-toggle button.active { background: var(--accent-dim); color: var(--accent); }
#agents { flex: 1; overflow-y: auto; padding: 8px 12px; }
.agent-node { padding: 6px 8px; border-radius: 6px; margin-bottom: 1px; display: flex; align-items: center; gap: 8px; transition: background 0.1s; }
.agent-node:hover { background: var(--surface-raised); }
.agent-node .agent-dot { width: 5px; height: 5px; border-radius: 50%; flex-shrink: 0; }
.agent-node .agent-dot.running { background: var(--green); box-shadow: 0 0 4px var(--agent-dot-glow); }
.agent-node .agent-dot.stopped { background: var(--text-muted); }
.agent-node .agent-name { color: var(--text); font-size: 13px; font-weight: 500; }
.agent-node .agent-dir { color: var(--text-muted); font-size: 10px; margin-left: auto; font-family: var(--mono); letter-spacing: -0.02em; }
.agent-children { padding-left: 14px; border-left: 1px solid var(--border); margin-left: 10px; }

/* Terminal viewer */
#terminal-header { padding: 6px 16px; font-size: 10px; font-weight: 600; color: var(--text-muted); border-top: 1px solid var(--border); border-bottom: 1px solid var(--border); text-transform: uppercase; letter-spacing: 0.08em; display: none; }
#terminal-container { flex: 1; min-height: 0; overflow: hidden; display: none; }
#terminal-container .xterm { height: 100%; }
.agent-node { cursor: pointer; }
.agent-node.selected { background: var(--accent-dim); }
</style>
</head>
<body>
<div id="status"><span class="dot off" id="dot"></span><span id="status-text">connecting</span><span id="voice-status"><span class="voice-dot"></span><span id="voice-status-text">listening</span></span><div id="theme-toggle"><button data-t="light" title="Light">&#9788;</button><button data-t="system" title="System" class="active">&#9680;</button><button data-t="dark" title="Dark">&#9790;</button></div></div>
<div id="main">
  <div id="chat-pane">
    <div id="messages"></div>
    <div id="input-bar">
      <label for="input" class="sr-only">Compose a message for Jevons.</label>
      <textarea id="input" name="prompt" rows="1"
                placeholder="Write a message to Jevons. Enter to send, Shift-Enter for a new line."
                aria-label="Compose a message for Jevons"
                aria-multiline="true"
                aria-describedby="input-hint"
                autocomplete="off"
                spellcheck="true"
                autocapitalize="sentences"></textarea>
      <span id="input-hint" class="sr-only">Type a prompt for the Jevons assistant. Use full sentences with punctuation.</span>
      <button id="send" disabled aria-label="Send message">Send</button>
      <button id="voice-btn" aria-label="Voice input" title="Click to toggle. Hold Ctrl to push-to-talk.">&#127908;</button>
    </div>
  </div>
  <div id="activity-pane">
    <div id="activity-header">Agents</div>
    <div id="agents"></div>
    <div id="terminal-header"></div>
    <div id="terminal-container"></div>
  </div>
</div>
<script src="scripts/jlog.js"></script>
<script src="scripts/transport.js"></script>
<script>
const msgs = document.getElementById('messages');
const input = document.getElementById('input');
const sendBtn = document.getElementById('send');
const dot = document.getElementById('dot');
const sTxt = document.getElementById('status-text');
const agentsEl = document.getElementById('agents');

let turnDetails = null;
let turnItems = null;
let turnCount = 0;

// Wire transport callbacks.
transport.onOpen = () => {
  const v = input.value;
  dot.className = 'dot on'; sTxt.textContent = 'connected'; sendBtn.disabled = false;
  msgs.innerHTML = ''; turnDetails = null; turnItems = null; turnCount = 0;
  input.value = v;
};
transport.onClose = () => {
  // Transport handles reconnect (backoff + version check) internally.
  dot.className = 'dot off'; sTxt.textContent = 'reconnecting'; sendBtn.disabled = true;
};
transport.onMessage = m => handle(m);
transport.onError = msg => console.error('transport error:', msg);

function connect() { transport.connect(); }

function handle(m) {
  const typ = m.type;

  const msgTs = m.timestamp ? new Date(m.timestamp).getTime() : Date.now();

  if (typ==='user') {
    const content = m.message?.content;
    if (typeof content === 'string') {
      closeTurn();
      addMsg('user', content, msgTs);
      startTurn();
    } else if (Array.isArray(content)) {
      content.forEach(c => {
        if (c.type==='tool_result') {
          const inner = c.content;
          if (typeof inner === 'string') addTurnItem('tool-result', truncate(inner, 120));
          else if (Array.isArray(inner)) inner.forEach(ic => {
            if (ic.type==='text' && ic.text) addTurnItem('tool-result', truncate(ic.text, 120));
          });
        }
      });
    }
  } else if (typ==='assistant') {
    const content = m.message?.content;
    if (!Array.isArray(content)) return;
    const hasText = content.some(c => c.type==='text' && c.text);
    content.forEach(c => {
      if (c.type==='tool_use') {
        addTurnItem('tool-use', c.name + (c.input ? ': ' + summariseInput(c.input) : ''));
      }
    });
    if (hasText) {
      closeTurn();
      content.forEach(c => {
        if (c.type==='text' && c.text) addMsg('jevons', c.text, msgTs);
      });
      input.focus();
    }
  } else if (typ==='tool_result' || typ==='result') {
    const content = m.content || m.message?.content;
    if (Array.isArray(content)) {
      content.forEach(c => {
        if (c.type==='text' && c.text) addTurnItem('tool-result', truncate(c.text, 120));
      });
    } else if (typeof content === 'string') {
      addTurnItem('tool-result', truncate(content, 120));
    }
  } else if (typ==='system') {
    closeTurn();
  }
}

function startTurn() {
  turnDetails = document.createElement('details');
  turnDetails.className = 'turn-details';
  turnDetails.open = true;
  const summary = document.createElement('summary');
  turnDetails.appendChild(summary);
  turnItems = document.createElement('div');
  turnItems.className = 'turn-items';
  turnDetails.appendChild(turnItems);
  msgs.appendChild(turnDetails);
  turnCount++;
  scrollDown();
}

function closeTurn() {
  if (!turnDetails) return;
  const n = turnItems ? turnItems.children.length : 0;
  if (n === 0) {
    turnDetails.remove();
  } else {
    turnDetails.open = false;
  }
  turnDetails = null;
  turnItems = null;
}

function addTurnItem(cls, text) {
  if (!turnItems) startTurn();
  const d = document.createElement('div');
  d.className = 'turn-item ' + cls;
  d.textContent = text;
  turnItems.appendChild(d);
  scrollDown();
}

function addMsg(role, text, when) {
  const d = document.createElement('div');
  d.className = 'msg ' + role;
  if (role === 'jevons') {
    d.innerHTML = marked.parse(text);
  } else {
    d.textContent = text;
  }
  const ms = when || Date.now();
  const ts = document.createElement('div');
  ts.className = 'msg-time';
  ts.dataset.ts = ms;
  ts.textContent = relTime(ms);
  d.appendChild(ts);
  msgs.appendChild(d);
  scrollDown();
  return d;
}

// Render a transient status note (centred, dim italic) — used for
// inline conditions like "didn't catch that" when a turn fails to
// transcribe. Distinct from worker notes (no header, no collapse).
function addStatusMsg(text) {
  const d = document.createElement('div');
  d.className = 'msg status';
  d.textContent = text;
  msgs.appendChild(d);
  scrollDown();
  return d;
}

// Render an out-of-band worker note (system-role entry). Collapsible
// <details> with a header showing the agent name + status + task id.
// Long results are scrollable inside a max-height body. 🎯T23.
function addWorkerMsg(msg) {
  const det = document.createElement('details');
  det.className = 'msg worker';
  const failed = msg.kind === 'task_failed';
  if (failed) det.classList.add('worker-failed');
  // Short notes (one-line) auto-expand; long results stay collapsed.
  const content = String(msg.content || '');
  det.open = content.length < 120;

  const sum = document.createElement('summary');
  const agentEl = document.createElement('span');
  agentEl.className = 'worker-agent';
  agentEl.textContent = msg.agent || 'worker';
  const kindEl = document.createElement('span');
  kindEl.className = 'worker-kind';
  kindEl.textContent = failed ? 'failed' : 'replied';
  const taskEl = document.createElement('span');
  taskEl.className = 'worker-task';
  taskEl.textContent = msg.task_id || '';
  sum.append(agentEl, kindEl, taskEl);
  det.appendChild(sum);

  const body = document.createElement('div');
  body.className = 'worker-body';
  body.textContent = content;
  det.appendChild(body);

  msgs.appendChild(det);
  scrollDown();
  return det;
}

// Agent tree
function refreshAgents() {
  fetch('/api/agents').then(r=>r.json()).then(agents => {
    agentsEl.innerHTML = '';
    const byParent = {};
    agents.forEach(a => {
      const p = a.parent || '';
      (byParent[p] = byParent[p] || []).push(a);
    });
    renderTree(byParent, '', agentsEl);
  }).catch(()=>{});
}
function renderTree(byParent, parent, container) {
  const children = byParent[parent] || [];
  children.forEach(a => {
    const node = document.createElement('div');
    node.className = 'agent-node' + (a.name === selectedAgent ? ' selected' : '');
    node.dataset.agent = a.name;
    node.innerHTML = '<span class="agent-dot '+a.status+'"></span>'
      + '<span class="agent-name">'+escHtml(a.name)+'</span>'
      + '<span class="agent-dir">'+escHtml(shortDir(a.workdir))+'</span>';
    node.onclick = () => selectAgent(a.name);
    container.appendChild(node);
    if (byParent[a.name]) {
      const sub = document.createElement('div');
      sub.className = 'agent-children';
      container.appendChild(sub);
      renderTree(byParent, a.name, sub);
    }
  });
}
function shortDir(d) {
  return d.replace(/^\/Users\/[^/]+/, '~').replace(/\/work\/github\.com\//,'/');
}
setInterval(refreshAgents, 3000);
refreshAgents();

let autoScroll = true;
msgs.addEventListener('scroll', () => {
  autoScroll = msgs.scrollTop + msgs.clientHeight >= msgs.scrollHeight - 30;
});
function scrollDown() { if (autoScroll) msgs.scrollTop = msgs.scrollHeight; }
function escHtml(s) { const d=document.createElement('span'); d.textContent=s; return d.innerHTML; }
function truncate(s, n) { return s.length > n ? s.slice(0, n-3) + '...' : s; }
function summariseInput(obj) {
  if (typeof obj === 'string') return truncate(obj, 60);
  const keys = Object.keys(obj);
  if (keys.length === 0) return '';
  const v = obj[keys[0]];
  return typeof v === 'string' ? truncate(v, 60) : keys.join(', ');
}

function relTime(ms) {
  const s = Math.floor((Date.now() - ms) / 1000);
  if (s < 60) return 'now';
  const m = Math.floor(s / 60);
  if (m < 60) return m + 'm';
  const h = Math.floor(m / 60);
  if (h < 24) return h + 'h';
  const d = Math.floor(h / 24);
  if (d < 7) return d + 'd';
  const dt = new Date(ms);
  const now = new Date();
  if (dt.getFullYear() === now.getFullYear()) {
    const days = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
    const months = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
    if (d < 14) return days[dt.getDay()] + ' ' + String(dt.getHours()).padStart(2,'0') + ':' + String(dt.getMinutes()).padStart(2,'0');
    return months[dt.getMonth()] + ' ' + dt.getDate();
  }
  return dt.toLocaleDateString();
}
setInterval(() => {
  document.querySelectorAll('.msg-time[data-ts]').forEach(el => {
    el.textContent = relTime(parseInt(el.dataset.ts));
  });
}, 30000);

function send() {
  const t = input.value.trim();
  if (!t) return;
  transport.send(t);
  input.value = '';
  autoGrow();
}

// Auto-grow the textarea: reset to one row, then expand to fit content
// (capped by CSS max-height with internal scroll once that's reached).
function autoGrow() {
  input.style.height = 'auto';
  input.style.height = input.scrollHeight + 'px';
}

// Enter submits, Shift-Enter inserts a newline.
input.addEventListener('keydown', e => { if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); send(); } });
input.addEventListener('input', autoGrow);
sendBtn.addEventListener('click', send);

autoGrow();
input.focus();
connect();

document.addEventListener('keydown', e => {
  if (e.key === 'PageUp') { e.preventDefault(); msgs.scrollBy(0, -msgs.clientHeight * 0.8); }
  if (e.key === 'PageDown') { e.preventDefault(); msgs.scrollBy(0, msgs.clientHeight * 0.8); }
});

// Theme toggle.
function applyTheme(pref) {
  const html = document.documentElement;
  if (pref === 'system') {
    html.removeAttribute('data-theme');
    const mq = window.matchMedia('(prefers-color-scheme: light)');
    html.setAttribute('data-theme', mq.matches ? 'light' : 'dark');
    mq.onchange = e => { if (localStorage.getItem('theme')==='system') html.setAttribute('data-theme', e.matches?'light':'dark'); };
  } else {
    html.setAttribute('data-theme', pref);
  }
  document.querySelectorAll('#theme-toggle button').forEach(b => b.classList.toggle('active', b.dataset.t===pref));
}
document.getElementById('theme-toggle').addEventListener('click', e => {
  const btn = e.target.closest('button');
  if (!btn) return;
  document.cookie = 'theme='+btn.dataset.t+';path=/;max-age=31536000';
  applyTheme(btn.dataset.t);
});
applyTheme((document.cookie.match(/(?:^|; )theme=([^;]*)/)||[])[1] || 'system');

// Terminal viewer.
const termHeader = document.getElementById('terminal-header');
const termContainer = document.getElementById('terminal-container');
let term = null;
let termWs = null;
let termFit = null;
let selectedAgent = null;

function selectAgent(name) {
  if (selectedAgent === name) {
    // Deselect.
    closeTerminal();
    return;
  }
  selectedAgent = name;
  document.querySelectorAll('.agent-node').forEach(n => n.classList.toggle('selected', n.dataset.agent === name));
  openTerminal(name);
}

function openTerminal(name) {
  closeTerminal();
  termHeader.textContent = name;
  termHeader.style.display = 'block';
  termContainer.style.display = 'block';

  term = new Terminal({
    fontFamily: 'JetBrains Mono, SF Mono, Menlo, monospace',
    fontSize: 12,
    theme: {
      background: '#0c0c0f',
      foreground: '#d4d4dc',
      cursor: '#8b7cf6',
      selectionBackground: 'rgba(139,124,246,0.3)',
    },
    scrollback: 10000,
    convertEol: true,
  });
  termFit = new FitAddon.FitAddon();
  term.loadAddon(termFit);
  term.open(termContainer);
  termFit.fit();

  const h = location.hostname === 'localhost' ? '127.0.0.1:'+location.port : location.host;
  const cols = term.cols;
  const rows = term.rows;
  termWs = new WebSocket((location.protocol==='https:'?'wss:':'ws:')+'//'+h+'/ws/agent-terminal?name='+encodeURIComponent(name)+'&cols='+cols+'&rows='+rows);
  termWs.binaryType = 'arraybuffer';
  termWs.onmessage = e => {
    if (e.data instanceof ArrayBuffer) {
      term.write(new Uint8Array(e.data));
    } else {
      term.write(e.data);
    }
  };
  termWs.onclose = () => { /* terminal closed */ };

  // Handle resize.
  const ro = new ResizeObserver(() => {
    if (termFit) {
      termFit.fit();
      if (termWs && termWs.readyState === 1) {
        termWs.send(JSON.stringify({type:'resize', cols:term.cols, rows:term.rows}));
      }
    }
  });
  ro.observe(termContainer);
  termContainer._ro = ro;
}

function closeTerminal() {
  selectedAgent = null;
  if (termWs) { termWs.close(); termWs = null; }
  if (term) { term.dispose(); term = null; }
  if (termContainer._ro) { termContainer._ro.disconnect(); termContainer._ro = null; }
  termHeader.style.display = 'none';
  termContainer.style.display = 'none';
  termContainer.innerHTML = '';
  document.querySelectorAll('.agent-node').forEach(n => n.classList.remove('selected'));
}

// Preserve input across hot reloads.
const savedInput = sessionStorage.getItem('jevons-input');
if (savedInput) { input.value = savedInput; sessionStorage.removeItem('jevons-input'); }

// Voice UI — uses transport abstraction for both browser and native modes.
const voiceBtn = document.getElementById('voice-btn');
const voiceStatus = document.getElementById('voice-status');
const voiceStatusText = document.getElementById('voice-status-text');
let voiceActive = false;

voiceBtn.addEventListener('click', () => {
  if (voiceActive) stopVoice(); else startVoice();
});

// Push-to-talk via Ctrl. Hold Control to engage voice, release to stop.
// If any other key is pressed while Ctrl is down, treat it as a Ctrl+X
// shortcut and cancel voice (so Ctrl+C / Ctrl+R / etc. still work).
// PTT model: voiceActive means "the WS to the server is open". pttActive
// means "Ctrl is currently held — actively recording". The WS persists
// across press/release cycles so the Grok session can stay alive between
// utterances (commit on release, response streams back over the same WS).
//
// Ctrl is the engagement key, but the user has system hotkeys that
// include Ctrl as a modifier (screenshots, etc.). To avoid engaging the
// mic the moment Ctrl goes down during one of those chords, we arm a
// short timer on Ctrl keydown and only engage when Ctrl has been held
// ALONE for pttArmDelayMs. Any other key arriving in that window
// cancels the arm, so Ctrl-Shift-3 etc. never fires the mic.
// 250ms is long enough to cover most multi-key system hotkeys
// (Ctrl→Shift→key chord sequences) without feeling sluggish for
// deliberate PTT presses, where the user is naturally holding the
// key down for >>250ms.
const pttArmDelayMs = 250;
let pttActive = false;
let pttArmTimer = null;

// Track every non-Ctrl key currently held so we can detect chords where
// some other key was pressed BEFORE Ctrl (simultaneous chord presses
// can land in any order; the previous logic only handled Ctrl-first).
const pttHeldKeys = new Set();

function pttArm() {
  if (pttArmTimer || pttActive) return;
  pttArmTimer = setTimeout(() => {
    pttArmTimer = null;
    pttEngage();
  }, pttArmDelayMs);
}

function pttCancelArm() {
  if (pttArmTimer) {
    clearTimeout(pttArmTimer);
    pttArmTimer = null;
  }
}

function pttEngage() {
  if (!voiceActive) startVoice(); // lazy-open on first engage
  pttActive = true;
  transport.startMic();
  vadReset();
  voiceBtn.classList.add('active');
  voiceBtn.style.boxShadow = '0 0 4px rgba(248,113,113,0.3)';
  voiceStatusText.textContent = 'listening';
  jLog('info', 'ptt engage', {
    voiceActive,
    audioCtxState: transport._audioCtx?.state,
    mediaStreamActive: transport._mediaStream?.active,
    voiceWsState: transport.voiceWs?.readyState,
  });
}

window.addEventListener('keydown', e => {
  if (e.repeat) return;
  if (e.key !== 'Control') pttHeldKeys.add(e.code);

  if (e.key === 'Control') {
    // Refuse to arm if anything else is already held — chord, not PTT.
    // Covers BOTH orderings: Ctrl-after-X (pttHeldKeys non-empty) and
    // Ctrl-with-modifier (e.shiftKey/altKey/metaKey already set, which
    // can happen even if the modifier keydown wasn't observed yet on
    // this listener — the underlying state is current).
    if (pttHeldKeys.size > 0 || e.shiftKey || e.altKey || e.metaKey) {
      console.debug('[ptt] arm suppressed — other key/modifier held');
      return;
    }
    pttArm();
  } else {
    // Any other keydown while we are armed or active → chord.
    pttCancelArm();
    if (pttActive && (e.ctrlKey || e.metaKey)) pttRelease();
  }
});
window.addEventListener('keyup', e => {
  if (e.key !== 'Control') pttHeldKeys.delete(e.code);
  if (e.key === 'Control') {
    pttCancelArm(); // brief Ctrl tap (< arm delay) → never engaged
    if (pttActive) pttRelease();
  }
});
// Window-blur, tab-switch, visibility loss: stop recording even if we
// missed the keyup (focus changes can swallow it). Force-kill the mic
// regardless of pttActive's state so the OS indicator can never hang
// stale. Also clear the held-keys Set — a key whose keyup we missed
// during a focus shift would otherwise stay "held" forever.
window.addEventListener('blur', () => {
  pttHeldKeys.clear();
  if (pttActive) pttRelease();
  transport.stopMic();
});
document.addEventListener('visibilitychange', () => {
  if (document.visibilityState !== 'visible') {
    pttHeldKeys.clear();
    if (pttActive) pttRelease();
    transport.stopMic();
  }
});

function pttRelease() {
  pttActive = false;
  voiceBtn.classList.remove('active');
  voiceBtn.style.boxShadow = '';
  const audioCtxState = transport._audioCtx?.state;
  const voiceWsState = transport.voiceWs?.readyState;
  const stats = {
    framesSeen: vad.framesSeen,
    framesSent: vad.framesSent,
    peakRms:    vad.peakRms,
    noiseFloor: vad.noiseFloor,
    audioCtxState, voiceWsState,
  };
  if (vad.heardSpeech) {
    voiceStatusText.textContent = 'processing';
    transport.commitVoice();
    jLog('info', 'ptt release / commit', stats);
  } else {
    voiceStatusText.textContent = 'listening';
    transport.clearVoice();
    jLog('info', 'ptt release / clear (no speech)', stats);
  }
}

function startVoice() {
  voiceBtn.classList.add('connecting');
  voiceActive = true;
  transport.startVoice();
}

function stopVoice() {
  voiceActive = false;
  pttActive = false;
  voiceBtn.classList.remove('active', 'connecting');
  voiceStatus.classList.remove('on');
  voiceBtn.style.boxShadow = '';
  transport.stopVoice();
}

// Transport's voice WS closed unexpectedly (most commonly: server-side
// 30 s idle timeout). Reset the page-level state so the next PTT press
// triggers a fresh startVoice() — without this, voiceActive stays true,
// startVoice is skipped, and the next utterance's audio + commit are
// silently dropped over a dead WS.
transport.onVoiceClose = () => {
  jLog?.('info', 'voice WS closed — resetting page state');
  // Don't call pttRelease — its commitVoice() would no-op against a
  // dead WS and the UI state would land in 'processing' instead of
  // back at 'idle'. Just inline the cleanup.
  pttCancelArm();
  pttActive = false;
  voiceActive = false;
  voiceBtn.classList.remove('active', 'connecting');
  voiceBtn.style.boxShadow = '';
  voiceStatus.classList.remove('on');
  voiceStatusText.textContent = 'listening';
};

// Local VAD — gate the audio stream to Grok so silence between turns
// or mid-pause "I changed my mind" releases don't deliver an empty
// buffer that Grok dutifully responds to.
//
// Design constraints (learned the hard way):
//   - holdMs must be long enough to span a normal mid-sentence pause
//     (~2-3 seconds), or VAD chops mid-utterance and Grok hears two
//     fragments instead of one. We pick 2500ms.
//   - preBuffer captures the few frames before VAD onset, otherwise
//     soft openings ("uh, can you...") lose their leading consonants.
//   - onset/offset use hysteresis (different ratios) so a single
//     loud blip doesn't briefly start/stop the stream.
//
// State is per-engagement: reset in pttEngage so VAD's noise floor
// learns from the current room rather than yesterday's session.
const vad = {
  noiseFloor:   0.005, // running estimate of background level
  noiseAlpha:   0.02,  // EMA weight for noise-floor adaptation
  onsetRatio:   2.5,   // RMS > noiseFloor * onsetRatio triggers speech
  offsetRatio:  1.5,   // RMS < noiseFloor * offsetRatio counts as silence
  holdMs:       2500,  // continue sending for this long after silence
  preBufferMax: 8,     // ~340ms of pre-roll at ~43ms/frame
  speaking:     false,
  holdUntil:    0,
  preBuffer:    [],
  heardSpeech:  false, // any onset during the current PTT cycle?
  // Per-engagement counters (for jLog diagnostics).
  framesSeen:   0,
  framesSent:   0,
  peakRms:      0,
};

function vadReset() {
  vad.speaking = false;
  vad.holdUntil = 0;
  vad.preBuffer = [];
  vad.heardSpeech = false;
  vad.framesSeen = 0;
  vad.framesSent = 0;
  vad.peakRms = 0;
  // Don't reset noiseFloor — let it stay adapted across PTT cycles.
}

transport.onMicFrame = ({handle, rms}) => {
  if (!pttActive) {
    return;
  }
  vad.framesSeen++;
  if (rms > vad.peakRms) vad.peakRms = rms;

  const now = Date.now();

  if (!vad.speaking) {
    vad.noiseFloor += vad.noiseAlpha * (rms - vad.noiseFloor);
    vad.preBuffer.push(handle);
    if (vad.preBuffer.length > vad.preBufferMax) vad.preBuffer.shift();

    if (rms > vad.noiseFloor * vad.onsetRatio && rms > 0.005) {
      vad.speaking = true;
      vad.heardSpeech = true;
      vad.holdUntil = now + vad.holdMs;
      for (const h of vad.preBuffer) { transport.sendAudio(h); vad.framesSent++; }
      vad.preBuffer = [];
      voiceBtn.style.boxShadow = '0 0 12px rgba(248,113,113,0.7)';
      jLog('debug', 'vad onset', {rms, noiseFloor: vad.noiseFloor});
    }
    return;
  }

  transport.sendAudio(handle);
  vad.framesSent++;

  if (rms > vad.noiseFloor * vad.offsetRatio) {
    vad.holdUntil = now + vad.holdMs;
  } else if (now > vad.holdUntil) {
    vad.speaking = false;
    voiceBtn.style.boxShadow = '0 0 4px rgba(248,113,113,0.3)';
    jLog('debug', 'vad hold expired', {framesSent: vad.framesSent});
  }
};

// Incoming audio from Grok — play it.
transport.onAudio = handle => transport.playAudio(handle);

// Voice events: status, transcripts, errors.
transport.onVoiceEvent = msg => {
  if (msg.type === 'status') {
    if (msg.status === 'connected') {
      voiceBtn.classList.remove('connecting');
      voiceBtn.classList.add('active');
      voiceStatus.classList.add('on');
      voiceStatusText.textContent = 'connecting to grok...';
    } else if (msg.status === 'ready') {
      voiceStatusText.textContent = 'listening';
    } else {
      voiceStatusText.textContent = msg.status;
    }
  } else if (msg.type === 'user_transcript') {
    addMsg('user', msg.text + ' \u{1F3A4}');
    voiceStatusText.textContent = 'listening';
  } else if (msg.type === 'assistant_transcript') {
    voiceStatusText.textContent = 'speaking';
    if (!startVoice._assistantEl) {
      startVoice._assistantEl = addMsg('jevons', '');
    }
    startVoice._assistantBuf = (startVoice._assistantBuf || '') + msg.text;
    const el = startVoice._assistantEl;
    const timeEl = el.querySelector('.msg-time');
    el.textContent = startVoice._assistantBuf;
    if (timeEl) el.appendChild(timeEl);
    scrollDown();
  } else if (msg.type === 'assistant_transcript_done') {
    if (startVoice._assistantEl && startVoice._assistantBuf) {
      const el = startVoice._assistantEl;
      const timeEl = el.querySelector('.msg-time');
      el.innerHTML = marked.parse(startVoice._assistantBuf);
      if (timeEl) el.appendChild(timeEl);
    }
    startVoice._assistantEl = null;
    startVoice._assistantBuf = '';
  } else if (msg.type === 'worker_note') {
    addWorkerMsg(msg);
  } else if (msg.type === 'transcript_failed') {
    // FSM unstuck from a wedged COMMITTING (xAI silent after commit).
    // Surface a brief inline note so the user knows the turn was lost
    // and they should retry, rather than waiting forever for a
    // response that's never coming.
    addStatusMsg('Sorry — didn\'t catch that. Try again.');
    voiceStatusText.textContent = 'listening';
  } else if (msg.type === 'error') {
    console.error('voice error:', msg.error);
    voiceStatusText.textContent = 'error';
    const d = document.createElement('div');
    d.className = 'msg jevons';
    d.style.color = 'var(--red)';
    d.style.border = '1px solid var(--red)';
    d.style.borderRadius = 'var(--radius)';
    d.style.padding = '10px 16px';
    d.textContent = msg.error;
    msgs.appendChild(d);
    scrollDown();
    stopVoice();
  }
};

// Hot reload + server-restart detection. The /ws/reload socket
// signals dev-time file changes ("reload" message). If the socket
// drops and a reconnect succeeds, the server was restarted —
// reload the page so fresh bundled assets are fetched.
(function hotReload() {
  const delays = [50, 100, 200, 400, 800, 1600, 3200, 5000];
  let attempt = 0;
  let wasOpen = false;
  const open = () => {
    const rh = location.hostname === 'localhost' ? '127.0.0.1:'+location.port : location.host;
    const rws = new WebSocket((location.protocol==='https:'?'wss:':'ws:')+'//'+rh+'/ws/reload');
    rws.onopen = () => {
      if (wasOpen) {
        // Server came back after going away — page assets may be stale.
        sessionStorage.setItem('jevons-input', input.value);
        location.reload();
        return;
      }
      wasOpen = true;
      attempt = 0;
    };
    rws.onmessage = () => {
      sessionStorage.setItem('jevons-input', input.value);
      location.reload();
    };
    rws.onclose = () => {
      const delay = delays[Math.min(attempt, delays.length - 1)];
      attempt++;
      setTimeout(open, delay);
    };
  };
  open();
})();
</script>
</body>
</html>
