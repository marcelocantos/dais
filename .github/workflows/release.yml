name: Release

on:
  release:
    types: [published]

permissions:
  contents: write

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - name: Test
        env:
          CGO_CFLAGS: "-DSQLITE_ENABLE_SESSION -DSQLITE_ENABLE_PREUPDATE_HOOK -DSQLITE_ENABLE_FTS5"
        run: |
          cp agents-guide.md internal/cli/help_agent.md
          go test -tags "sqlite_preupdate_hook sqlite_fts5" ./...

  build:
    needs: test
    strategy:
      matrix:
        include:
          - runner: macos-latest
            goos: darwin
            goarch: arm64
          - runner: ubuntu-latest
            goos: linux
            goarch: amd64
          - runner: ubuntu-24.04-arm
            goos: linux
            goarch: arm64
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Build
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: "1"
          CGO_CFLAGS: "-DSQLITE_ENABLE_SESSION -DSQLITE_ENABLE_PREUPDATE_HOOK -DSQLITE_ENABLE_FTS5"
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          LDFLAGS="-X github.com/marcelocantos/jevons/internal/cli.Version=${VERSION}"
          cp agents-guide.md internal/cli/help_agent.md

          go build -tags "sqlite_preupdate_hook sqlite_fts5" \
            -ldflags "${LDFLAGS}" -o jevonsd ./cmd/jevonsd
          go build -tags "sqlite_preupdate_hook sqlite_fts5" \
            -ldflags "${LDFLAGS}" -o remote ./cmd/remote

          tar czf "jevons-${VERSION}-${{ matrix.goos }}-${{ matrix.goarch }}.tar.gz" \
            jevonsd remote

      - name: Upload artifacts
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release upload "${{ github.ref_name }}" \
            jevons-*-${{ matrix.goos }}-${{ matrix.goarch }}.tar.gz
